<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <title>Virtuálne Košice – Obľúbené</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/swipe-bar.css">
  <style>
    .card{
      background: rgba(20,26,44,0.92);
      border: 1px solid rgba(120,140,255,0.25);
      border-radius: 14px;
      padding: 14px;
      text-align: left;
      margin-top: 14px;
    }
    .row{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px}
    .row button{flex:1; min-width:160px}
    .muted{opacity:0.9}
    .empty{opacity:0.9; margin-top:10px}
  </style>
</head>
<body>
<script src="js/auth.js"></script>
<script>AUTH.requireAuth();</script>
<div class="background"></div>

<div class="swipe-panel swipe-panel--page" style="max-width:820px;">
  <div class="swipe-scroll" id="favScroll" tabindex="0" role="region" aria-label="Obľúbené objekty">
    <div class="container fade-in">
      <h1 class="title" style="text-align:center;">⭐ Obľúbené</h1>
      <p class="subtitle" style="text-align:center;">Zoznam uložených objektov (uložené lokálne v prehliadači)</p>

      <div id="list"></div>

      <div class="row" style="margin-top:18px;">
        <button class="small-btn" onclick="window.location.href='locations.html'">← Späť</button>
        <button class="small-btn" id="clearAllBtn">Vymazať všetko</button>
      </div>
    </div>
  </div>
  <div class="swipe-bar" role="scrollbar" aria-orientation="vertical" aria-controls="favScroll" hidden aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
    <span class="swipe-bar-hint" aria-hidden="true">↑ ↓</span>
    <div class="swipe-bar-track">
      <div class="swipe-bar-thumb" aria-hidden="true"></div>
    </div>
  </div>
</div>

<script src="js/buildingsConfig.js"></script>
<script src="js/swipe-bar.js"></script>
<script>
  function loadFavorites(){
    return JSON.parse(localStorage.getItem("favorites") || "[]");
  }

  function saveFavorites(arr){
    localStorage.setItem("favorites", JSON.stringify(arr));
  }

  function removeFavorite(id){
    const fav = loadFavorites().filter(x => x !== id);
    saveFavorites(fav);
    render();
  }

  function clearAll(){
    localStorage.removeItem("favorites");
    render();
  }

  function render(){
    const listEl = document.getElementById("list");
    const fav = loadFavorites();

    function getBuildingById(id) {
      if (!window.BUILDINGS) return null;
      if (Array.isArray(window.BUILDINGS)) {
        return window.BUILDINGS.find(item => (item.id || item.key) === id) || null;
      }
      if (typeof window.BUILDINGS === "object") {
        return window.BUILDINGS[id] || null;
      }
      return null;
    }

    function getSceneUrl(id, info) {
      const zone = info && info.zone ? info.zone : "";
      const query = zone
        ? ("zone=" + encodeURIComponent(zone) + "&id=" + encodeURIComponent(id))
        : ("id=" + encodeURIComponent(id));
      return "3dscene.html?" + query;
    }

    if(!fav.length){
      listEl.innerHTML = `<p class="empty">Zatiaľ nemáš uložené žiadne objekty. Prejdi do 3D scény a ulož si budovy do obľúbených.</p>`;
      if (typeof window.refreshSwipeBars === "function") window.refreshSwipeBars();
      return;
    }

    let html = "";
    fav.forEach(id => {
      const info = getBuildingById(id);
      const name = info ? (info.name || info.title || id) : ("Neznámy objekt (" + id + ")");
      const desc = info ? (info.description || info.desc || "Popis nie je dostupný.") : "Popis nie je dostupný.";

      html += `
        <div class="card">
          <h2 style="margin:0 0 6px; font-size:18px;">${name}</h2>
          <div class="muted">${desc}</div>
          <div class="row">
            <a class="main-btn" href="${getSceneUrl(id, info)}" style="display:inline-flex;align-items:center;justify-content:center;text-decoration:none;">Detail</a>
            <button class="small-btn" onclick="removeFavorite('${id}')">Odstrániť</button>
          </div>
        </div>
      `;
    });

    listEl.innerHTML = html;
    if (typeof window.refreshSwipeBars === "function") window.refreshSwipeBars();
  }

  document.getElementById("clearAllBtn").addEventListener("click", () => {
    if(confirm("Naozaj chcete vymazať všetky obľúbené objekty?")){
      clearAll();
    }
  });

  render();
</script>
</body>
</html>
